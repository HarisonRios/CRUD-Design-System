spring:
  application:
    name: crud-design-system
  config:
    import: optional:file:.env

  # ─── Database ────────────────────────────────────────────────────────────
  # Troque o banco apenas mudando as variáveis de ambiente DB_URL, DB_USERNAME, DB_PASSWORD.
  #
  # PostgreSQL:
  #   DB_URL=jdbc:postgresql://localhost:5432/crud_design_system
  #
  # MySQL:
  #   DB_URL=jdbc:mysql://localhost:3306/crud_design_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  #
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/crud_design_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # Dialeto automático — Spring Boot detecta pelo driver do DB_URL
        # Você NÃO precisa trocar isso ao mudar de banco
    open-in-view: false

  data:
    jpa:
      repositories:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ─── JWT ──────────────────────────────────────────────────────────────────
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:86400000}       # 24h em ms
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 dias em ms

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: CRUD Design System API
    description: Reusable CRUD Platform — API Documentation
    version: 1.0.0

logging:
  level:
    com.crudsystem: DEBUG
    org.springframework.security: INFO
